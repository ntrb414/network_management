<!-- 管理后台侧边栏组件 -->
<!-- 使用方式: 在模板中使用 "include 'includes/admin_sidebar.html'" 并传入 nav_section 参数 -->

<aside class="nb-sidebar">
    <div class="nb-sidebar-section">导航</div>
    <a href="{% url 'homepage:homepage' %}" class="nb-sidebar-item {% if nav_section == 'home' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        仪表盘
    </a>
    <div class="nb-sidebar-divider"></div>
    <div class="nb-sidebar-section">功能模块</div>
    <a href="{% url 'devices:device_list' %}" class="nb-sidebar-item {% if nav_section == 'devices' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        设备管理
    </a>
    {% include 'includes/device_config_sidebar_item.html' %}
    <a href="{% url 'monitoring:monitoring_dashboard' %}" class="nb-sidebar-item {% if nav_section == 'monitoring' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        性能监控
    </a>
    <a href="{% url 'alerts:alert_list' %}" class="nb-sidebar-item {% if nav_section == 'alerts' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        告警管理
    </a>
    <a href="{% url 'logs:runtime_log_list' %}" class="nb-sidebar-item {% if nav_section == 'runtime_logs' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
            <rect x="9" y="9" width="6" height="6"></rect>
            <line x1="9" y1="1" x2="9" y2="4"></line>
            <line x1="15" y1="1" x2="15" y2="4"></line>
            <line x1="9" y1="20" x2="9" y2="23"></line>
            <line x1="15" y1="20" x2="15" y2="23"></line>
            <line x1="20" y1="9" x2="23" y2="9"></line>
            <line x1="20" y1="14" x2="23" y2="14"></line>
            <line x1="1" y1="9" x2="4" y2="9"></line>
            <line x1="1" y1="14" x2="4" y2="14"></line>
        </svg>
        设备日志
    </a>
    <a href="{% url 'accounts:account_list' %}" class="nb-sidebar-item {% if nav_section == 'accounts' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        账户管理
    </a>
    <div class="nb-sidebar-divider"></div>
    <div class="nb-sidebar-section">系统</div>
    <a href="{% url 'admin_panel:scheduled_tasks' %}" class="nb-sidebar-item {% if nav_section == 'scheduled_tasks' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        定时任务
    </a>
</aside>
