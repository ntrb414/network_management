<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 网络管理系统</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 2rem;
        }

        .error-container {
            background: white;
            border-radius: 1.5rem;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .error-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #f5576c;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        h1 {
            color: var(--gray-900);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p {
            color: var(--gray-600);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .path-box {
            background: var(--gray-50);
            border-radius: 0.75rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
            word-break: break-all;
        }

        .path-box h3 {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .path-box code {
            background: var(--gray-200);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: var(--gray-700);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-container">
            <div class="error-icon">🔍</div>
            <div class="error-code">404</div>
            <h1>页面未找到</h1>
            <p>您访问的页面不存在或已被移动。</p>
            
            <div class="path-box">
                <h3>请求的 URL</h3>
                <code>{{ request_path }}</code>
            </div>
            
            <div class="btn-group">
                <a href="{% url 'homepage:homepage' %}" class="btn btn-primary">
                    🏠 返回首页
                </a>
                <a href="javascript:history.back()" class="btn btn-secondary">
                    ← 返回上页
                </a>
            </div>
        </div>
    </div>
</body>
</html>
