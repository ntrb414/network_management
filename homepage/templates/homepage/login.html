<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网络管理系统</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <style>
        body {
            background: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo {
            width: 40px;
            height: 40px;
            background: var(--foreground);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.875rem;
            color: var(--primary-foreground);
        }

        .login-logo svg { width: 22px; height: 22px; }

        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--foreground);
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            margin-top: 0.25rem;
        }

        .login-card {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: var(--shadow);
        }

        .login-card .form-group { margin-bottom: 0.875rem; }

        .login-card input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            border: 1px solid var(--input);
            border-radius: var(--radius);
            background: var(--background);
            color: var(--foreground);
            transition: var(--transition);
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--ring);
            box-shadow: 0 0 0 2px rgba(24,24,27,.08);
        }

        .login-card input::placeholder { color: var(--muted-foreground); }

        .btn-login {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.5625rem;
            font-size: 0.9375rem;
        }

        .login-error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            padding: 0.625rem 0.875rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <div class="login-title">网络管理系统</div>
            <div class="login-subtitle">请登录您的账户</div>
        </div>

        <div class="login-card">
            {% if error %}
                <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-login">登录</button>
            </form>
        </div>

        <div class="login-footer">网络管理系统 v1.0</div>
    </div>
</body>
</html>
